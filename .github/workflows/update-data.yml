name: Update battery research data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect latest papers, news, videos and patent leads
        run: npm run update:data

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update battery research feeds"
          file_pattern: data/*.json
