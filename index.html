<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电池行业智能情报工作台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">BI</div>
          <div>
            <p>Battery Intelligence</p>
            <h1>电池行业智能情报工作台</h1>
          </div>
        </div>

        <nav id="sideNav" class="side-nav" aria-label="主导航">
          <button class="nav-item is-active" data-view="overview" type="button">
            <span>总览</span><small>Dashboard</small>
          </button>
          <button class="nav-item" data-view="intelligence" type="button">
            <span>情报</span><small>News / Papers</small>
          </button>
          <button class="nav-item" data-view="companies" type="button">
            <span>公司</span><small>Company</small>
          </button>
          <button class="nav-item" data-view="technology" type="button">
            <span>技术</span><small>Technology</small>
          </button>
          <button class="nav-item" data-view="supply" type="button">
            <span>产业链</span><small>Supply Chain</small>
          </button>
          <button class="nav-item" data-view="recycling" type="button">
            <span>回收</span><small>Recycling</small>
          </button>
          <button class="nav-item" data-view="evidence" type="button">
            <span>证据</span><small>Evidence</small>
          </button>
          <button class="nav-item" data-view="trace" type="button">
            <span>来源追踪</span><small>Trace</small>
          </button>
          <button class="nav-item" data-view="ai" type="button">
            <span>AI 问答</span><small>Static RAG</small>
          </button>
          <button class="nav-item" data-view="backend" type="button">
            <span>后端规划</span><small>Backend</small>
          </button>
        </nav>

        <div class="sidebar-note">
          <strong>工作台逻辑</strong>
          <p>先选择对象，再看证据、公司、技术、供应链、市场图和 AI 回答。所有结论都尽量回到来源。</p>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p id="viewKicker" class="eyebrow">Overview</p>
            <h2 id="viewTitle">总览</h2>
          </div>
          <div class="topbar-controls">
            <label>
              <span>当前对象</span>
              <select id="entitySelect"></select>
            </label>
            <label class="search-control">
              <span>全局搜索</span>
              <input id="globalSearch" type="search" placeholder="CATL、钠离子、隔膜、回收、dry electrode" />
            </label>
          </div>
        </header>

        <section id="objectContext" class="object-context"></section>
        <section id="viewRoot" class="view-root"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
