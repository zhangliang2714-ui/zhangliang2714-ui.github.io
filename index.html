<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>折纸结构 3D 可视化（单文件版）</title>
  <style>
    :root { color-scheme: dark; --bg:#0f1420; --panel:#1a2235; --line:#2f3e61; --accent:#7f9cf5; --text:#eaf0ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Noto Sans SC",system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at top,#1a2440,var(--bg)); }
    header { padding:16px 18px 8px; }
    h1 { margin:0 0 6px; font-size:22px; }
    .sub { margin:0; opacity:.86; line-height:1.45; }
    main { display:grid; grid-template-columns:280px 1fr; gap:12px; padding:0 12px 12px; height:calc(100vh - 90px); }
    .panel { background:rgba(26,34,53,.92); border:1px solid var(--line); border-radius:14px; padding:12px; }
    .panel h2 { margin:4px 0 10px; font-size:16px; }
    .panel button { width:100%; text-align:left; border:1px solid #45557f; background:#24314d; color:var(--text); border-radius:10px; padding:10px; margin:0 0 8px; cursor:pointer; }
    .panel button.active { border-color:var(--accent); background:#334670; }
    .panel label { display:block; font-size:13px; margin:10px 0 4px; opacity:.9; }
    .panel input[type="range"] { width:100%; }
    .value { font-size:12px; opacity:.85; margin-bottom:8px; }
    .tip { font-size:13px; opacity:.85; line-height:1.5; }
    #viewer { border:1px solid var(--line); border-radius:14px; overflow:hidden; min-height:420px; }
    kbd { background:#2e3c61; border-radius:4px; padding:0 6px; }
    @media (max-width:900px){ main{grid-template-columns:1fr; height:auto;} #viewer{height:65vh;} }
  </style>
</head>
<body>
  <header>
    <h1>典型折纸结构 3D 可视化（打开即用）</h1>
    <p class="sub">左键旋转、滚轮缩放、右键平移，按 <kbd>R</kbd> 重置视角。点击左侧按钮切换模型。</p>
  </header>

  <main>
    <aside class="panel">
      <h2>模型</h2>
      <button data-model="miura">Miura-ori 折纸板</button>
      <button data-model="waterbomb">Waterbomb 管</button>
      <button data-model="kresling" class="active">Kresling 折纸筒</button>
      <label for="compression">轴向压缩（受力变形）</label>
      <input id="compression" type="range" min="0" max="100" value="0" />
      <div class="value">压缩量：<span id="compressionValue">0%</span></div>
      <p class="tip">这是单一 <code>index.html</code> 文件，不需要安装依赖。你可以直接双击打开，或用本地服务打开。</p>
    </aside>
    <section id="viewer"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.164.1/examples/js/controls/OrbitControls.js"></script>
  <script>
    const viewer = document.getElementById('viewer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1018);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
    camera.position.set(6, 4, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    viewer.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    scene.add(new THREE.HemisphereLight(0xcad8ff, 0x1a2230, 1.1));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(4, 8, 5);
    scene.add(keyLight);

    const grid = new THREE.GridHelper(18, 18, 0x51638f, 0x2c3448);
    grid.position.y = -1.3;
    scene.add(grid);

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);
    const compressionInput = document.getElementById('compression');
    const compressionValueEl = document.getElementById('compressionValue');
    let currentModel = 'kresling';
    let compression = 0;

    function clearModels(){ while(modelGroup.children.length) modelGroup.remove(modelGroup.children[0]); }

    function addFoldedStrip(width, depth, cols, rows, amp, mat){
      const geo = new THREE.BufferGeometry();
      const vertices = [], indices = [];
      for(let r=0;r<=rows;r++){
        for(let c=0;c<=cols;c++){
          const x=(c/cols-0.5)*width, z=(r/rows-0.5)*depth;
          const y=Math.sin((c+r)*Math.PI)*amp;
          vertices.push(x,y,z);
        }
      }
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const i=r*(cols+1)+c;
          indices.push(i,i+cols+1,i+1,i+1,i+cols+1,i+cols+2);
        }
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return new THREE.Mesh(geo, mat);
    }

    function buildMiura(){
      clearModels();
      const mat=new THREE.MeshStandardMaterial({ color:0x8195ff, metalness:0.2, roughness:0.45, side:THREE.DoubleSide });
      const sheet=addFoldedStrip(8,5,12,8,0.35,mat);
      sheet.rotation.x=-0.35;
      modelGroup.add(sheet);
    }

    function buildWaterbomb(){
      clearModels();
      const mat=new THREE.MeshStandardMaterial({ color:0x84e1bc, metalness:0.15, roughness:0.45, side:THREE.DoubleSide });
      const radius=1.8,height=4.8,seg=20,hSeg=16;
      const geo=new THREE.BufferGeometry(), vertices=[], indices=[];
      for(let y=0;y<=hSeg;y++){
        const v=y/hSeg, yy=(v-0.5)*height;
        for(let i=0;i<=seg;i++){
          const u=i/seg, t=u*Math.PI*2;
          const fold=Math.sin((u*seg+y)*Math.PI)*0.22;
          const r=radius+fold;
          vertices.push(Math.cos(t)*r,yy,Math.sin(t)*r);
        }
      }
      for(let y=0;y<hSeg;y++){
        for(let i=0;i<seg;i++){
          const a=y*(seg+1)+i, b=a+seg+1;
          indices.push(a,b,a+1,a+1,b,b+1);
        }
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
      geo.setIndex(indices); geo.computeVertexNormals();
      modelGroup.add(new THREE.Mesh(geo, mat));
    }

    function buildKresling(c = 0){
      clearModels();
      const mat=new THREE.MeshStandardMaterial({ color:0xb59cff, metalness:0.25, roughness:0.35, side:THREE.DoubleSide });
      const h=5.2,n=8,levels=9,r=1.5;
      const geo=new THREE.BufferGeometry(), vertices=[], indices=[];
      const compressedHeight = h * (1 - 0.55 * c);
      const maxTwist = Math.PI * (0.95 + 0.9 * c);
      const bulge = 0.16 + 0.3 * c;
      for(let j=0;j<=levels;j++){
        const v=j/levels, twist=v*maxTwist, yy=(v-0.5)*compressedHeight;
        for(let i=0;i<n;i++){
          const angle=(i/n)*Math.PI*2+twist;
          const rr=r+Math.sin((i+j)*Math.PI)*bulge;
          vertices.push(Math.cos(angle)*rr,yy,Math.sin(angle)*rr);
        }
      }
      for(let j=0;j<levels;j++){
        for(let i=0;i<n;i++){
          const a=j*n+i,b=j*n+((i+1)%n),c=(j+1)*n+i,d=(j+1)*n+((i+1)%n);
          indices.push(a,c,b,b,c,d);
        }
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
      geo.setIndex(indices); geo.computeVertexNormals();
      modelGroup.add(new THREE.Mesh(geo, mat));
    }

    function renderModelByName(name){
      if(name === 'kresling') buildKresling(compression);
      else if(name === 'miura') buildMiura();
      else buildWaterbomb();
    }
    document.querySelectorAll('button[data-model]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('button[data-model]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentModel = btn.dataset.model;
        renderModelByName(currentModel);
      });
    });
    compressionInput.addEventListener('input', () => {
      compression = Number(compressionInput.value) / 100;
      compressionValueEl.textContent = `${compressionInput.value}%`;
      if (currentModel === 'kresling') renderModelByName('kresling');
    });

    window.addEventListener('keydown', e=>{
      if(e.key.toLowerCase()==='r'){
        camera.position.set(6,4,8);
        controls.target.set(0,1.2,0);
      }
    });

    function resize(){
      const w=viewer.clientWidth, h=viewer.clientHeight;
      camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
    }
    window.addEventListener('resize', resize);
    resize();
    renderModelByName('kresling');

    (function animate(){
      requestAnimationFrame(animate);
      modelGroup.rotation.y += 0.002;
      controls.update();
      renderer.render(scene,camera);
    })();
  </script>
</body>
</html>
